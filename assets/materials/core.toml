# Core material set. Id 0 (`air`) is built into the engine and must not be
# declared here; these materials get ids 1.. in declaration order.
# Keys: name, color (linear RGB, 0..=1), jitter (0..=1, default 0.0),
# density (kg/m³, > 0), strength (relative, >= 0), solid (default true).
#
# `strength` is relative destruction resistance: the blast/carve tools compare
# against it, so higher values survive bigger blasts. `solid = false` means
# no collision (raycasts, the player, rigidbody contacts, and the
# destruction connectivity flood all pass through) -- it does NOT affect
# rendering, which is keyed on air vs. non-air only.
# Every *.toml in this directory is loaded in case-insensitive filename order;
# a material name declared in two files is an error.

[[material]]
name = "stone"
color = [0.55, 0.55, 0.57]
jitter = 0.04
density = 2600.0
strength = 8.0

[[material]]
